apiVersion: apps/v1
kind: Deployment
metadata:
  name: metis-web
  labels: {app: metis-web}
spec:
  replicas: {{ .Values.web.replicas }}
  selector: {matchLabels: {app: metis-web}}
  template:
    metadata: {labels: {app: metis-web}}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/metis-web:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{containerPort: 3000}]
          envFrom:
            - configMapRef: {name: metis-config}
          readinessProbe:
            httpGet: {path: /login, port: 3000}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources: {{ toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: metis-web
  labels: {app: metis-web}
spec:
  selector: {app: metis-web}
  ports: [{port: 3000, targetPort: 3000}]
