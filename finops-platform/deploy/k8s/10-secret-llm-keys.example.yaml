# 실제 키는 이 파일을 복사해 적용하거나(권장 아님), kubectl 로 직접 생성:
#   kubectl -n metis-finops create secret generic metis-llm-keys \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=OPENAI_API_KEY='' \
#     --from-literal=AZURE_OPENAI_ENDPOINT='https://<리소스>.openai.azure.com' \
#     --from-literal=AZURE_OPENAI_API_KEY='...'
# 운영 권장: Azure Key Vault + Secrets Store CSI Driver 로 주입 (가이드 7장 참조)
apiVersion: v1
kind: Secret
metadata:
  name: metis-llm-keys
  namespace: metis-finops
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_API_VERSION: "2024-10-21"
