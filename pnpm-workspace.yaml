packages:
  - 'apps/*'
  - 'packages/*'

# Approve install/build scripts. pnpm 10.4+/11 blocks un-approved build scripts
# (supply-chain safety) and fails `pnpm install` with ERR_PNPM_IGNORED_BUILDS.
# pnpm 11 reads this `allowBuilds` map (package -> true/false).
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
