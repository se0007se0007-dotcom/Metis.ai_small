# Metis.AI — Local Development Services
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: metis-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: metis
      POSTGRES_PASSWORD: metis_secret
      POSTGRES_DB: metis_dev
    volumes:
      - metis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U metis -d metis_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: metis-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  metis_pgdata:
