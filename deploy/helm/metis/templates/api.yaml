apiVersion: apps/v1
kind: Deployment
metadata:
  name: metis-api
  labels: {app: metis-api}
spec:
  replicas: {{ .Values.api.replicas }}
  selector: {matchLabels: {app: metis-api}}
  template:
    metadata: {labels: {app: metis-api}}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/metis-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{containerPort: 4000}]
          envFrom:
            - configMapRef: {name: metis-config}
            - secretRef: {name: {{ include "metis.secretName" . }}}
          readinessProbe:
            httpGet: {path: /v1/health, port: 4000}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /v1/health, port: 4000}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - {name: data, mountPath: {{ .Values.persistence.mountPath }}}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: metis-data}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: metis-api
  labels: {app: metis-api}
spec:
  selector: {app: metis-api}
  ports: [{port: 4000, targetPort: 4000}]
